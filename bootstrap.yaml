
sources:
  - type: nacos
    server_addr: "127.0.0.1"
    username: "nacos"
    password: "nacos"
    namespace: "conf"
    configs:
      - data_id: "conf.properties"
        group: "DEFAULT_GROUP"
        dynamic: true
        file_extension: "properties"

  - type: file
    configs:
      - path: "server.toml"
        format: "toml"

      - path: "server.properties"
        format: "properties"

  - type: env
  - type: args
