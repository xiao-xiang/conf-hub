
sources:
  - type: nacos
    server_addr: "www.soyue.top"
    username: "nacos"
    password: "nacos"
    namespace: "conf"
    configs:
      - data_id: "conf.properties"
        group: "DEFAULT_GROUP"
        dynamic: true
        file_extension: "properties"

  - type: file
    configs:
      - path: "server.toml"
        format: "toml"

      - path: "server.properties"
        format: "properties"

  - type: env
    prefix: "APP_"

  - type: args
